name: Makefile CI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

# on: workflow_dispatch

jobs:
  build:

    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v3

      - name: Build
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          make

      - name: Package release
        shell: pwsh
        run: |
          $packageDir = "release/IdrAgra_${{ github.ref_name }}_windows"
          $zipPath = "$packageDir.zip"

          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          Copy-Item release/*.exe $packageDir/
          Copy-Item Utilities $packageDir/Utilities -Recurse
          Copy-Item demo $packageDir/demo -Recurse
          Compress-Archive -Path "$packageDir/*" -DestinationPath $zipPath -Force

      - name: Create GitHub release
        shell: pwsh
        run: |
          $exe = Get-ChildItem release/*.exe | Select-Object -First 1
          $zip = Get-ChildItem release/IdrAgra_${{ github.ref_name }}_windows.zip

          gh release create "${{ github.ref_name }}" `
            $exe.FullName `
            $zip.FullName `
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
